<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenZ Toss Simulator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #090f12, #0d323e, #2c5364);
        color: white;
    }

    .container {
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.08);
        border-radius: 25px;
        padding: 40px;
        text-align: center;
        width: 350px;
        box-shadow: 0 0 30px rgba(0,255,255,0.2);
    }

    h1 {
        font-size: 24px;
        margin-bottom: 20px;
        background: linear-gradient(90deg, #00f5ff, #ff00d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .coin {
        width: 120px;
        height: 120px;
        margin: 20px auto;
        border-radius: 50%;
        background: gold;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
        color: black;
        transition: transform 1s ease-in-out;
    }

    .flip {
        animation: flip 1s ease-in-out;
    }

    @keyframes flip {
        0% { transform: rotateY(0); }
        50% { transform: rotateY(720deg); }
        100% { transform: rotateY(1440deg); }
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 20px;
        background: linear-gradient(90deg, #32255d, #7f611f);
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-top: 15px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px #00f5ff;
    }

    .result {
        margin-top: 15px;
        font-size: 20px;
    }

    .ai-comment {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
    }

    .stats {
        margin-top: 15px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🪙 Toss Simulator</h1>

    <div id="coin" class="coin">?</div>

    <button onclick="flipCoin()">Flip Coin</button>

    <div class="result" id="result"></div>
    <div class="ai-comment" id="comment"></div>
    <div class="stats" id="stats">Streak: 0</div>
</div>

<script>
let streak = 0;
let lastResult = "";

const comments = {
    Heads: [
        "Heads again? You're blessed fr 😎",
        "Okayyy luck is on your side 🔥",
        "This is NOT random anymore 👀"
    ],
    Tails: [
        "Tails... universe said nope 💀",
        "Skill issue honestly 😂",
        "Nah this coin got attitude 😤"
    ]
};

function flipCoin() {
    const coin = document.getElementById("coin");
    const resultText = document.getElementById("result");
    const commentText = document.getElementById("comment");
    const statsText = document.getElementById("stats");

    coin.classList.add("flip");

    setTimeout(() => {
        const result = Math.random() < 0.5 ? "Heads" : "Tails";

        coin.textContent = result;
        resultText.textContent = "Result: " + result;

        // Streak logic
        if (result === lastResult) {
            streak++;
        } else {
            streak = 1;
        }

        lastResult = result;

        statsText.textContent = "Streak: " + streak;

        // AI Comment
        const randomComment = comments[result][Math.floor(Math.random() * comments[result].length)];
        commentText.textContent = randomComment;

        coin.classList.remove("flip");

        // vibration feel (if supported)
        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

    }, 900);
}

// keyboard support (spacebar)
document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        flipCoin();
    }
});
</script>

</body>
</html>
